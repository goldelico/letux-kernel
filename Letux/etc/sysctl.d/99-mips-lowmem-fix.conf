# --- MIPS Low Memory & USB (dwc2) Stability Fix ---

# Disable watermark boosting to prevent the kernel from creating
# artificially high memory reserves (often 8MB+). On a 64MB system,
# this "boost" frequently triggers false page allocation failures.

vm.watermark_boost_factor = 0

# Tighten the gaps between 'min', 'low', and 'high' watermarks.
# The default (100) is too aggressive for 64MB RAM.
# On a small system, every kilobyte counts.

vm.watermark_scale_factor = 10

# Guarantee a 2MB buffer for atomic requests (GFP_ATOMIC).
# This ensures that the dwc2 USB driver has enough contiguous
# memory for bounce buffers during interrupts.

vm.min_free_kbytes = 2048

# Reduce swappiness to keep more file-backed pages in RAM,
# reducing the I/O pressure that often leads to fragmentation.

vm.swappiness = 10
